kind = "web"
previewPath = "/"
title = "MedStudent"
version = "1.0.0"
id = "artifacts/medical-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20087

[services.development]
run = "pnpm --filter @workspace/medical-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medical-app", "run", "build" ]
publicDir = "artifacts/medical-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20087"
BASE_PATH = "/"
